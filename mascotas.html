    <header>
        <h1>Mascotas</h1>
        <nav>
            <ul>
                <li><a href="index.html">Volver al Portafolio</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="galeria">
            <article>
                <figure>
                    <img src="https://revafrog.home.blog/wp-content/uploads/2020/06/peter-kustra-1.jpg?w=596" alt="Rana dorada">
                    <figcaption>
                        <h3>Rana dorada</h3>
                        <p>(Phyllobates terribilis) es una de las criaturas más fascinantes y peligrosas del mundo. Es una joya de la naturaleza colombiana que destaca tanto por su belleza como por su letalidad.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="https://cdn.prod.website-files.com/68b49f78e2ebd20e1dd73f8f/6904c07465d1daf92fbc7624_zoo-guadeloupe-animaux-mammiferes-jaguar-keeza-01.jpg" alt="Jaguar">
                    <figcaption>
                        <h3>Jaguar</h3>
                        <p>(Panthera onca) es el felino más grande de América y el tercero del mundo. En la cosmovisión de las culturas indígenas colombianas, es venerado como el símbolo máximo de poder, fuerza y protección.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="https://www.kienyke.com/sites/default/files/2021-07/oso-de-anteojos.jpeg" alt="Oso de anteojos">
                    <figcaption>
                        <h3>Oso de anteojos</h3>
                        <p>(Tremarctos ornatus), también conocido como oso andino, es el "arquitecto de los bosques". Es la única especie de oso nativa de Sudamérica y un habitante vital de las altas montañas colombianas.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="https://www.raisg.org/wp-content/uploads/2022/07/3SMN6L3WBNAHJCW4JHWOYZADRE.jpg" alt="Delfín rosado">
                    <figcaption>
                        <h3>Delfín rosado</h3>
                        <p>(Inia geoffrensis), también conocido como Boto, es el delfín de agua dulce más grande del mundo. Es una criatura mística que protagoniza innumerables leyendas en las selvas colombianas.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="https://taxonomiaanimal.wordpress.com/wp-content/uploads/2018/04/titi.jpg?w=640" alt="Tití Cabeciblanco">
                    <figcaption>
                        <h3>Tití Cabeciblanco</h3>
                        <p>(Saguinus oedipus) es uno de los primates más carismáticos y amenazados del mundo. Su apariencia única y su comportamiento social lo convierten en una verdadera joya del Caribe colombiano.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="https://static.wikia.nocookie.net/reinoanimalia/images/d/d1/Andean_condor_by_Alamy.jpg/revision/latest?cb=20250902201815&path-prefix=es" alt="Cóndor de los Andes">
                    <figcaption>
                        <h3>Cóndor de los Andes</h3>
                        <p>(Vultur gryphus) es el rey de las alturas y el símbolo nacional de Colombia. Su imponente presencia en los picos más altos representa la libertad y la soberanía del país.</p>
                    </figcaption>
                </figure>
            </article>
        </section>
    </main>
